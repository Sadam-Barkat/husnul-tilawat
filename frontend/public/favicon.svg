<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Husn-ul-Tilawat Icon</title>
  <desc id="desc">Open Qur'an with a sound wave, symbolizing AI-based Qur'an pronunciation learning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e" />
      <stop offset="1" stop-color="#022c22" />
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f9fafb" />
      <stop offset="1" stop-color="#e5e7eb" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)" />

  <!-- Open book / mushaf -->
  <g transform="translate(10 14)">
    <!-- Left page -->
    <path
      d="M4 6c0-1.657 1.343-3 3-3h13c2.761 0 5 2.239 5 5v20c0 1.105-.895 2-2 2H9c-2.761 0-5-2.239-5-5V6z"
      fill="url(#page)"
    />
    <!-- Right page -->
    <path
      d="M40 6c0-1.657-1.343-3-3-3H24c-2.761 0-5 2.239-5 5v20c0 1.105.895 2 2 2h14c2.761 0 5-2.239 5-5V6z"
      fill="url(#page)"
    />

    <!-- Center spine -->
    <rect x="23" y="4" width="2" height="24" fill="#d1d5db" />

    <!-- Subtle page shadows -->
    <path
      d="M9 10c3 0 5.5.8 7.5 2.4C18 11.2 21 10 24.5 10"
      fill="none"
      stroke="#e5e7eb"
      stroke-width="1.2"
      stroke-linecap="round"
    />
    <path
      d="M24.5 10c3 0 5.5.8 7.5 2.4C34 11.2 37 10 40 10"
      fill="none"
      stroke="#e5e7eb"
      stroke-width="1.2"
      stroke-linecap="round"
    />

    <!-- Simple circular motif hinting at Quranic ornament -->
    <circle cx="16" cy="18" r="4" fill="none" stroke="#0f766e" stroke-width="1.2" />
    <circle cx="16" cy="18" r="1.8" fill="#0f766e" />
  </g>

  <!-- Sound / recitation wave on the right side -->
  <g transform="translate(36 18)" stroke="#a7f3d0" stroke-linecap="round" stroke-width="1.6">
    <path d="M0 16v6" />
    <path d="M6 12v10" />
    <path d="M12 8v14" />
  </g>
</svg>

